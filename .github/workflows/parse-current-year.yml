name: Parse current year

on:
  schedule:
    # Every 6 hours, on the hour
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parse-current-year
  cancel-in-progress: false

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Determine current year
        id: year
        run: echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"

      - name: Parse current year
        run: python parse_results.py config.json dist/data --year ${{ steps.year.outputs.year }}

      - name: Commit and push if changed
        env:
          YEAR: ${{ steps.year.outputs.year }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "dist/data/${YEAR}.json" "dist/data/years.json"

          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi

          git commit -m "chore: refresh ${YEAR} results"
          git push
